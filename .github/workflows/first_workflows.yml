name: Action-workflow

on: 
  push:

jobs:
  first-job:
    runs-on: ubuntu-latest

    steps:
      - name: Print Message for 1st job
        run: |
          sleep 10
          echo "This is first stage"

  second-job:
    runs-on: ubuntu-22.04
    needs: first-job

    steps:
      - name: Print message for 2nd job
        run: | 
          sleep 5
          echo "This is 2nd stage"
