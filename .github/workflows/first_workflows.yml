name: Action-workflow

on: 
  push:

jobs:
  first-job:
    runs-on: ubuntu-latest

    steps:
      - name: create file
        run:  echo "This is test report" > report.txt

      - name: upload the file 
        uses: actions/upload-artifact@v4
        with:
           name: report.txt
           path: ./report.txt  



  second-job:
    runs-on: ubuntu-22.04
    needs: first-job

    steps:
      - name: download the file
        uses: actions/download-artifact@v4
        with:
           name: report.txt 

      - name: viewing report from first job
        run:  cat report.txt
